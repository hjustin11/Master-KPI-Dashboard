name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # CI hat keine echten Secrets (Supabase-URL, Anon-Key etc.); env.ts würde
          # in Production-Build sonst hart abbrechen. Wir validieren im CI nur den
          # Code-Build — Secret-Pflicht greift dann erst in Vercel mit echten Vars.
          SKIP_ENV_VALIDATION: "1"

      - name: Test
        run: npm test

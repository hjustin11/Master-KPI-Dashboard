name: Trigger Vercel Production Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trigger-deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger and validate Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            echo "Create a Vercel Deploy Hook and store it in GitHub Actions secrets."
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(curl --show-error --silent --output "$response_file" --write-out "%{http_code}" --request POST "$VERCEL_DEPLOY_HOOK_URL")"

          echo "Vercel hook HTTP status: $http_code"
          echo "Vercel hook response:"
          cat "$response_file"
          echo

          case "$http_code" in
            200|201|202)
              ;;
            *)
              echo "Deploy hook call failed with HTTP $http_code"
              exit 1
              ;;
          esac

          if grep -Eqi "unauthorized|forbidden|not found|invalid" "$response_file"; then
            echo "Deploy hook response indicates an invalid/wrong hook URL."
            exit 1
          fi

          echo "Vercel deploy hook accepted. If no deployment appears,"
          echo "the hook likely belongs to a different Vercel project/team."

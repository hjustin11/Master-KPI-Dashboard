name: Trigger Vercel Production Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trigger-deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            echo "Create a Vercel Deploy Hook and store it in GitHub Actions secrets."
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered."

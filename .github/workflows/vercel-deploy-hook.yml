name: Trigger Vercel Production Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trigger-deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger and validate Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_EXPECTED_PROJECT_ID: ${{ secrets.VERCEL_EXPECTED_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            echo "Create a Vercel Deploy Hook and store it in GitHub Actions secrets."
            exit 1
          fi

          hook_project_id="$(printf '%s\n' "$VERCEL_DEPLOY_HOOK_URL" | sed -nE 's#.*deploy/(prj_[^/]+)/.*#\1#p')"
          if [ -z "$hook_project_id" ]; then
            echo "Could not parse Vercel project id from hook URL."
            exit 1
          fi
          echo "Hook target project id: $hook_project_id"

          if [ -n "$VERCEL_EXPECTED_PROJECT_ID" ]; then
            if [ "$hook_project_id" != "$VERCEL_EXPECTED_PROJECT_ID" ]; then
              echo "Hook project id mismatch."
              echo "Expected: $VERCEL_EXPECTED_PROJECT_ID"
              echo "Actual:   $hook_project_id"
              exit 1
            fi
          else
            echo "Secret VERCEL_EXPECTED_PROJECT_ID not set; skipping project-id guard."
          fi

          response_file="$(mktemp)"
          http_code="$(curl --show-error --silent --output "$response_file" --write-out "%{http_code}" --request POST "$VERCEL_DEPLOY_HOOK_URL")"

          echo "Vercel hook HTTP status: $http_code"
          echo "Vercel hook response:"
          cat "$response_file"
          echo

          case "$http_code" in
            200|201|202)
              ;;
            *)
              echo "Deploy hook call failed with HTTP $http_code"
              exit 1
              ;;
          esac

          if grep -Eqi "unauthorized|forbidden|not found|invalid" "$response_file"; then
            echo "Deploy hook response indicates an invalid/wrong hook URL."
            exit 1
          fi

          echo "Vercel deploy hook accepted. If no deployment appears,"
          echo "the hook likely belongs to a different Vercel project/team."
